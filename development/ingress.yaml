apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rules-gitops-argocd-demo
  labels:
    app: nginx
spec:
  ingressClassName: nginx
  rules:
  - host: cliente1.curso.local
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: dev-svc
            port:
              number: 80
